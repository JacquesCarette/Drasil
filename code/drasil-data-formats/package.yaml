spec-version: 0.36.0
name:         drasil-data-formats
version:      0.0.1
author:       "Jacques Carette, Spencer Smith"
maintainer:   "Jacques Carette"
synopsis:     A framework for code and document generation for scientific software
github:       JacquesCarette/Drasil
homepage:     https://jacquescarette.github.io/Drasil/
description:  Please see the README on GitHub at <https://github.com/JacquesCarette/Drasil#readme>

language: Haskell2010
default-extensions:
- StrictData

extra-source-files: []

dependencies:
- base >= 4.7 && < 5
- prettyprinter
- text

ghc-options:
- -Wall
- -Wredundant-constraints
- -Wmissing-export-lists

library:
  source-dirs: lib
  exposed-modules:
  - Drasil.Data.Formats.CSV

tests:
  drasil-data-formats-test:
    source-dirs: test
    main: Main.hs
    dependencies:
    - drasil-file-handling
    - drasil-data-formats
    - filepath
    - tasty
    - tasty-hunit
