name:        drasil
version:     0.2.0.0
author:      "Dan Szymczak, Steven Palmer, Jacques Carette, Spencer Smith"
maintainer:  "Jacques Carette"
synopsis:	   A framework for code and document generation for scientific software.
github:      JacquesCarette/Drasil
homepage:    https://jacquescarette.github.io/Drasil/
description: Please see the README on GitHub at <https://github.com/JacquesCarette/Drasil#readme>

extra-source-files: []

dependencies:
- base >= 4.7 && < 5
- aeson
- aeson-pretty
- bytestring
- composition
- containers
- directory
- filepath
- lens
- mtl
- multiplate
- pretty
- split
- time
- transformers
- drasil-database
- drasil-lang
- drasil-metadata
- drasil-theory
- drasil-utils

ghc-options:
- -Wall
- -Wredundant-constraints

executables:
  codegenTest:
    main: Main
    source-dirs: drasil-code/test
    ghc-options:
    - -threaded
    - -O2
    dependencies:
    - drasil-code
    - drasil-gool

  dblpendulum:
    main: Main
    source-dirs:
    - drasil-example/dblpendulum/app
    - drasil-example/dblpendulum/lib
    dependencies:
    - drasil-code
    - drasil-data
    - drasil-database
    - drasil-docLang
    - drasil-gen
    - drasil-gool
    - drasil-lang
    - drasil-metadata
    - drasil-printers
    - drasil-theory
    - drasil-utils
    when:
    - condition: false
      other-modules: Paths_dblpendulum

internal-libraries:
  drasil-build:
    source-dirs: drasil-build/lib
    exposed-modules:
    - Build.Drasil
    when:
    - condition: false
      other-modules: Paths_drasil_build

  drasil-gool:
    source-dirs: drasil-gool/lib
    exposed-modules:
    - GOOL.Drasil
    when:
    - condition: false
      other-modules: Paths_drasil_gool

  drasil-sysinfo:
    source-dirs: drasil-sysinfo/lib
    exposed-modules:
    - SysInfo.Drasil
    when:
    - condition: false
      other-modules: Paths_drasil_sysinfo

  drasil-data:
    source-dirs: drasil-data/lib
    when:
    - condition: false
      other-modules: Paths_drasil_data

  drasil-printers:
    source-dirs: drasil-printers/lib
    dependencies:
    - drasil-sysinfo
    exposed-modules:
    - Language.Drasil.Printers
    when:
    - condition: false
      other-modules: Paths_drasil_printers

  drasil-code:
    source-dirs: drasil-code/lib
    dependencies:
    - drasil-build
    - drasil-gool
    - drasil-printers
    - drasil-sysinfo
    exposed-modules:
    - Language.Drasil.Code
    - Data.Drasil.ExternalLibraries.ODELibraries
    when:
    - condition: false
      other-modules: Paths_drasil_code

  drasil-docLang:
    source-dirs: drasil-docLang/lib
    dependencies:
    - drasil-lang
    - drasil-data
    - drasil-database
    - drasil-printers
    - drasil-sysinfo
    - drasil-theory
    - drasil-utils 
    exposed-modules:
    - Drasil.DocLang
    - Drasil.DocLang.Notebook
    - Drasil.DocLang.SRS
    - Drasil.DocumentLanguage.Units
    - Drasil.DocumentLanguage.TraceabilityGraph
    - Drasil.SRSDocument
    when:
    - condition: false
      other-modules: Paths_drasil_docLang

  drasil-gen:
    source-dirs: drasil-gen/lib
    dependencies:
    - drasil-build
    - drasil-code
    - drasil-docLang
    - drasil-gool
    - drasil-printers
    - drasil-sysinfo
    exposed-modules:
    - Language.Drasil.Generate
    when:
    - condition: false
      other-modules: Paths_drasil_gen
