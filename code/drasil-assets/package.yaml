spec-version: 0.36.0
name:         drasil-assets
version:      0.0.1
author:       "Jason Balaci, Jacques Carette, Spencer Smith"
maintainer:   "Jacques Carette"
synopsis:     A framework for code and document generation for scientific software - Assets SubPackage
github:       JacquesCarette/Drasil
homepage:     https://jacquescarette.github.io/Drasil/
description:  Please see the README on GitHub at <https://github.com/JacquesCarette/Drasil#readme>

language: Haskell2010
default-extensions:
- ImportQualifiedPost
- StrictData

extra-source-files: []

dependencies:
- base >= 4.7 && < 5
- bytestring
- directory
- filepath
- file-io >= 0.1.6
- template-haskell
- text
- drasil-file-handling

ghc-options:
- -Wall
- -Wredundant-constraints
- -Wmissing-export-lists

library:
  source-dirs: lib
  exposed-modules:
  - Drasil.Assets

tests:
  drasil-assets-test:
    source-dirs: test
    main: Main.hs
    dependencies:
    - drasil-assets
    - drasil-file-handling
    - hedgehog
    - tasty
    - tasty-hedgehog
    - tasty-hunit
    - prettyprinter
